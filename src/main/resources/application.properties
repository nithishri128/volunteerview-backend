spring.application.name=VolunteerView
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/volunteer_view_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET:VmxoRjNlVjBsTnRlZXJWaWV3U2VjcmV0S2V5Rm9ySldUQXV0aGVudGljYXRpb24yMDI1}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

app.cors.allowed-origins=${APP_CORS_ORIGINS:http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://localhost:8090,http://127.0.0.1:8090}

